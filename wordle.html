<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <meta name="theme-color" content="#0d1b2a"/>
  <title>Palabra del Día · Camino Bíblico</title>
  <link rel="stylesheet" href="css/wordle.css"/>
</head>
<body>
  <main class="app">

    <!-- Header -->
    <header class="header">
      <button class="icon-btn" onclick="history.back()">←</button>
      <div class="header-center">
        <h1>Palabra del Día</h1>
        <div id="progress-dots" class="progress-dots"></div>
      </div>
      <div class="stats-mini">
        <div class="stat"><span id="racha">0</span><small>racha</small></div>
        <div class="stat"><span id="xp-total">+0</span><small>XP</small></div>
      </div>
    </header>

    <!-- Tema / cita -->
    <div class="meta-card">
      <div class="meta-label" id="word-label">Cargando...</div>
      <div class="meta-tema" id="tema">—</div>
      <div class="meta-cita" id="cita">—</div>
    </div>

    <!-- Grid de letras -->
    <section id="grid" class="grid"></section>

    <!-- Pista -->
    <div class="pista-bar">
      <span id="pista-texto" class="pista-text">Pista disponible tras 2 intentos</span>
      <button id="btn-pista" class="btn-pista" disabled>💡 Pista</button>
    </div>

    <!-- Teclado -->
    <section id="teclado" class="teclado"></section>

  </main>

  <!-- Modal resultado de una palabra -->
  <div id="modal" class="modal hidden" role="dialog">
    <div class="modal-card">
      <div id="modal-emoji" class="modal-emoji">🎉</div>
      <h2 id="modal-title">¡Correcto!</h2>
      <p id="modal-body"></p>
      <div class="modal-stats">
        <div class="mstat"><strong id="m-xp">+0</strong><small>XP</small></div>
        <div class="mstat"><strong id="m-intentos">0</strong><small>intentos</small></div>
        <div class="mstat"><strong id="m-racha">0</strong><small>racha</small></div>
      </div>
      <button id="modal-btn" class="btn-primary">Continuar →</button>
    </div>
  </div>

  <!-- Modal día completo -->
  <div id="modal-fin" class="modal hidden" role="dialog">
    <div class="modal-card">
      <div class="modal-emoji">🏆</div>
      <h2>¡Día completado!</h2>
      <p id="fin-body"></p>
      <button onclick="document.getElementById('modal-fin').classList.add('hidden')"
              class="btn-primary">Cerrar</button>
    </div>
  </div>

  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="supabase.js"></script>
  <script src="js/wordle.js"></script>
</body>
</html>
