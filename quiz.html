<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <meta name="theme-color" content="#0d1b2a"/>
  <title>Quiz Bíblico · Camino Bíblico</title>
  <link rel="stylesheet" href="css/quiz.css"/>
</head>
<body>

  <!-- ═══════════════ PANTALLA: CARGANDO ═══════════════ -->
  <div id="screen-loading" class="screen active">
    <div class="loading-inner">
      <div class="loading-logo">📖</div>
      <div class="loading-title">Camino Bíblico</div>
      <div class="loading-bar"><div id="loading-progress"></div></div>
      <div class="loading-msg" id="loading-msg">Cargando mundos...</div>
    </div>
  </div>

  <!-- ═══════════════ PANTALLA: MAPA DE MUNDOS ═══════════════ -->
  <div id="screen-map" class="screen">
    <header class="map-header">
      <button class="icon-btn" onclick="history.back()">←</button>
      <div class="map-header-center">
        <h1>Camino Bíblico</h1>
        <div class="header-sub">Elige tu mundo</div>
      </div>
      <div class="hud-mini">
        <div class="hud-stat"><span id="total-xp">0</span><small>XP</small></div>
        <div class="hud-stat"><span id="total-stars">0</span><small>⭐</small></div>
      </div>
    </header>
    <div id="worlds-list" class="worlds-list"></div>
  </div>

  <!-- ═══════════════ PANTALLA: MAPA DE NIVELES ═══════════════ -->
  <div id="screen-levels" class="screen">
    <header class="level-header" id="level-header">
      <button class="icon-btn" onclick="showScreen('map')">←</button>
      <div>
        <h2 id="level-world-title">Mundo</h2>
        <div class="header-sub" id="level-world-desc"></div>
      </div>
    </header>
    <div id="levels-list" class="levels-list"></div>
  </div>

  <!-- ═══════════════ PANTALLA: JUEGO ═══════════════ -->
  <div id="screen-game" class="screen">
    <!-- HUD -->
    <div class="game-hud">
      <button class="icon-btn small" id="btn-quit">✕</button>
      <div class="progress-bar-wrap">
        <div class="progress-bar-track">
          <div id="game-progress-bar" class="progress-bar-fill"></div>
        </div>
        <span id="game-q-counter" class="q-counter">1/5</span>
      </div>
      <div class="hud-right">
        <div id="lives-display" class="lives"></div>
        <div class="xp-pill" id="game-xp">0 XP</div>
      </div>
    </div>

    <!-- Mentor -->
    <div class="mentor-area">
      <div id="mentor-emoji" class="mentor-emoji">🧙</div>
      <div id="mentor-msg" class="mentor-msg"></div>
      <div id="streak-badge" class="streak-badge hidden">🔥 <span id="streak-num">0</span></div>
    </div>

    <!-- Pregunta -->
    <div class="question-card" id="question-card">
      <div class="q-category" id="q-category"></div>
      <p class="q-text" id="q-text">Cargando...</p>
    </div>

    <!-- Opciones -->
    <div id="options-grid" class="options-grid"></div>

    <!-- Ref + siguiente -->
    <div id="answer-footer" class="answer-footer hidden">
      <div class="ref-line" id="ref-line"></div>
      <button id="btn-next" class="btn-next">Siguiente →</button>
    </div>
  </div>

  <!-- ═══════════════ MODAL: RESULTADO DE NIVEL ═══════════════ -->
  <div id="modal-result" class="modal hidden">
    <div class="modal-card">
      <div id="res-emoji" class="res-emoji">🏆</div>
      <h2 id="res-title">¡Completado!</h2>
      <p id="res-body"></p>
      <div class="res-stars" id="res-stars"></div>
      <div class="res-stats">
        <div class="rstat"><strong id="r-xp">0</strong><small>XP</small></div>
        <div class="rstat"><strong id="r-correct">0</strong><small>correctas</small></div>
        <div class="rstat"><strong id="r-streak">0</strong><small>racha máx</small></div>
      </div>
      <div class="modal-btns">
        <button id="btn-retry" class="btn-secondary">🔄 Reintentar</button>
        <button id="btn-continue" class="btn-primary">Continuar →</button>
      </div>
    </div>
  </div>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="supabase.js"></script>
  <script src="js/quiz.js"></script>
</body>
</html>
